<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Password Cracking Cost Lab</title>
    <link rel="stylesheet" href="style.css?v=20260724-compact-demo">
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">COMP6841 Project B</p>
          <h1>Password Cracking Cost Lab</h1>
          <p class="subtitle">Offline cracking cost demo with synthetic passwords.</p>
        </div>

        <div class="header-actions">
          <button class="primary-action" id="run-chain" type="button">Run demo</button>
          <button class="secondary-action" id="reset-chain" type="button">Reset</button>
        </div>
      </header>

      <nav class="stage-tabs" aria-label="Dashboard stages">
        <button class="stage-tab is-active" type="button" data-view="overview">
          <span>01</span>
          Overview
        </button>
        <button class="stage-tab" type="button" data-view="passwords">
          <span>02</span>
          Password Set
        </button>
        <button class="stage-tab" type="button" data-view="setup">
          <span>03</span>
          Attack Budget
        </button>
        <button class="stage-tab" type="button" data-view="results">
          <span>04</span>
          Results
        </button>
        <button class="stage-tab" type="button" data-view="findings">
          <span>05</span>
          Findings
        </button>
      </nav>

      <main>
        <section class="stage-intro">
          <div>
            <p class="eyebrow" id="stage-kicker">Ready</p>
            <h2 id="stage-title">Cost Model</h2>
          </div>
          <p id="stage-takeaway">coverage x rank x cost x budget</p>
        </section>

        <section class="metric-strip" aria-label="Current experiment metrics">
          <article>
            <span>Attack budget</span>
            <strong id="metric-window">--</strong>
          </article>
          <article>
            <span>Samples</span>
            <strong id="metric-samples">--</strong>
          </article>
          <article>
            <span>SHA-256 result</span>
            <strong id="metric-sha">--</strong>
          </article>
          <article>
            <span>Argon2id result</span>
            <strong id="metric-argon">--</strong>
          </article>
        </section>

        <section class="stage-panel" id="view-panel" aria-live="polite"></section>
      </main>
    </div>

    <script src="app.js?v=20260724-compact-demo"></script>
  </body>
</html>
